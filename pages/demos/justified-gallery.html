<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Preimage · justified gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font: 14px/1.5 -apple-system, system-ui, sans-serif; margin: 2rem; }
    .controls { margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .gallery { position: relative; }
    .row { position: relative; margin-bottom: 8px; }
    .item { position: absolute; top: 0; overflow: hidden; background: #222; }
    .item img { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <h1>Justified gallery</h1>
  <p>Standalone row packer (from <code>@somnai-dreams/preimage/gallery</code>) — not part of the pretext integration, but the same prepared measurements feed it for free.</p>
  <div class="controls">
    <label>Row height
      <input id="rowHeight" type="range" min="80" max="320" value="180" />
      <span id="rowHeightValue">180</span>px
    </label>
    <label>Max width
      <input id="maxWidth" type="range" min="320" max="1600" value="960" />
      <span id="maxWidthValue">960</span>px
    </label>
  </div>
  <div id="gallery" class="gallery"></div>
  <script type="module" src="./justified-gallery.ts"></script>
</body>
</html>
